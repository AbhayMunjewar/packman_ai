<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Classic Pac-Man arcade game with BFS ghost AI, built with HTML5 Canvas and JavaScript">
    <title>PAC-MAN — Arcade Classic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1 id="game-title">PAC-MAN</h1>
        <div id="hud">
            <div id="score-display">
                <span class="hud-label">SCORE</span>
                <span id="score-value">0</span>
            </div>
            <div id="lives-display">
                <span class="hud-label">LIVES</span>
                <span id="lives-value"></span>
            </div>
            <div id="level-display">
                <span class="hud-label">LEVEL</span>
                <span id="level-value">1</span>
            </div>
        </div>
        <div id="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
            <div id="overlay">
                <div id="overlay-content">
                    <h2 id="overlay-title">READY!</h2>
                    <p id="overlay-message">Press ENTER to Start</p>
                </div>
            </div>
        </div>
        <div id="controls-info">
            <span>↑ ↓ ← → to move</span>
            <span>ENTER to start/restart</span>
            <span>P to pause</span>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
